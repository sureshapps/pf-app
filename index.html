<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
<!-- Mobile view styles -->
<meta name="HandheldFriendly" content="True"> 
<meta name="MobileOptimized" content="320"/> 
<meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0; user-scalable=no" />
<meta http-equiv="cleartype" content="on">
    
    <meta name="theme-color" content="#FF6B6B" />
    <meta name="background-color" content="#FFE4D6" />
    <meta name="description" content="Creative Designer Developer Portfolio - Showcasing creative digital experiences" />
    <meta name="keywords" content="portfolio, design, ui/ux, mobile, web" />
    <meta name="author" content="Suresh Kaleyannan" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Portfolio" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SURESH.app" />
    <meta name="msapplication-TileColor" content="#FF6B6B" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#FF6B6B" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>SURESH.app</title>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
